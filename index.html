<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bot Platform</title>

<style>
/* ===== RESET ===== */
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f3f3f3;
  font-family: system-ui, sans-serif;
  color: #333;
}

/* ===== CONTAINER ===== */
.container {
  width: 100%;
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

/* ===== AUTH ===== */
.auth-box {
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 24px;
}

.auth-box h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

.auth-box input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.auth-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #ff7aa2;
  color: white;
  font-size: 15px;
}

/* ===== HEADERS ===== */
h3 {
  margin: 18px 0 10px;
  font-size: 16px;
}

/* ===== HOT BOTS ===== */
.hot-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding: 10px 0;
}

.hot-scroll::-webkit-scrollbar {
  display: none;
}

.hot-card {
  min-width: 120px;
  height: 160px;
  background: #ddd;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0.5;
  transform: scale(0.9);
  transition: 0.25s ease;
  scroll-snap-align: center;
  flex-shrink: 0;
}
